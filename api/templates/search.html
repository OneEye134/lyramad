{% extends "base.html" %}
{% block content %}
<h2 class="text-xl font-semibold mb-4">Search Results for "{{ query }}"</h2>
{% if results %}
    <ul class="space-y-2">
        {% for r in results %}
            <li class="p-3 bg-gray-800 rounded hover:bg-yellow-500 hover:text-gray-900">
                <span class="font-bold">{{ r.word | capitalize }}</span>: {{ r.msg }} 
                <em class="text-gray-400">({{ r.name }}, {{ r.date }})</em>
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>No results found.</p>
{% endif %}
<a href="/" class="mt-4 inline-block text-yellow-400 hover:text-yellow-300">Back to Home</a>
{% endblock %}
