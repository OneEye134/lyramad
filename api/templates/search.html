{% extends "base.html" %}
{% block content %}
<h2 class="text-xl font-semibold mb-4">Search Results for "{{ query }}"</h2>

{% if results %}
<div class="grid gap-4 md:grid-cols-2">
    {% for r in results %}
    <div class="flex items-start bg-gray-800 p-4 rounded hover:bg-yellow-500 hover:text-gray-900 transition">
        <!-- Profile picture -->
        <img src="https://raw.githubusercontent.com/OneEye134/lyramad/refs/heads/main/api/pfp/api/pfp/{ r.name}.jpg" alt="{{ r.name }}" class="w-12 h-12 rounded-full mr-4 object-cover">

        <!-- Message content -->
        <div>
            <p class="font-bold">{{ r.name }}:</p>
            <p>{{ r.msg }}</p>
            <p class="text-gray-400 text-sm">{{ r.date }}</p>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<p>No results found.</p>
{% endif %}

<a href="/" class="mt-4 inline-block text-yellow-400 hover:text-yellow-300">Back to Home</a>
{% endblock %}
